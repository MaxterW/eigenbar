<title>EigenBar</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<h1>EigenBar</h1>

<div id="filters">


<input
id="search"
placeholder="Cocktail suchen..."
>


<select id="categoryFilter">

<option value="">
Alle Kategorien
</option>

</select>




<label>
Alkohol:
</label>


<input
type="range"
id="alcoholFilter"
min="0"
max="50"
value="50"
>


<span id="alcoholValue">
50 %
</span>


<div class="flavor-box">

    <button id="flavorToggle">
        Geschmacksprofile ▼
    </button>


    <div id="flavorFilterContainer" class="hidden">

        <div id="flavorFilter"></div>


        <button id="selectAllFlavors">
            Alle auswählen
        </button>


        <button id="deselectAllFlavors">
            Alle abwählen
        </button>

    </div>

</div>


<div id="cocktails"></div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>


</body>

</html>
